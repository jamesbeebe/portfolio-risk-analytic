name: CI

# Trigger this workflow when code is pushed to the main development branches
# and when pull requests are opened against main.
on:
  push:
    branches: [master, development-branch]
  pull_request:
    branches: [master]

jobs:
  test:
    name: Lint and Test
    # `ubuntu-latest` is GitHub's hosted Linux runner image for CI jobs.
    runs-on: ubuntu-latest

    steps:
      # Step 1: Check out the repository code onto the runner.
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Install the Python version this project standardizes on.
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          # Cache downloaded pip packages between runs to speed up CI.
          cache: "pip"

      # Step 3: Install project dependencies into the runner environment.
      - name: Install dependencies
        run: pip install -r requirements.txt

      # Step 4: Run the Ruff linter and report findings in GitHub-friendly format.
      - name: Lint with ruff
        run: ruff check . --output-format=github

      # Step 5: Verify code is already formatted correctly.
      - name: Check formatting with ruff
        run: ruff format --check .

      # Step 6: Run unit and integration tests in a clean SQLite-backed environment.
      # We skip the e2e smoke tests because they require a live server and external data.
      - name: Run tests
        env:
          DATABASE_URL: sqlite:///./test_portfolio_risk.db
        run: pytest tests/ -k "not e2e and not smoke" -v --tb=short

      # Step 7: Build the Docker image to ensure container packaging still works.
      - name: Build Docker image
        run: docker build -t portfolio-risk-api:ci .

  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    # `needs` means this job only starts if the `test` job succeeds first.
    needs: test

    steps:
      # Check out the repository again because each job gets a fresh runner.
      - name: Checkout code
        uses: actions/checkout@v4

      # Build the image, start a temporary container, and confirm the health endpoint responds.
      - name: Build and verify Docker image
        run: |
          docker build -t portfolio-risk-api:test .
          docker run --rm \
            -e DATABASE_URL=sqlite:///./test.db \
            -p 8000:8000 \
            --detach \
            --name ci-test-container \
            portfolio-risk-api:test
          sleep 5
          curl --fail http://localhost:8000/health || exit 1
          docker stop ci-test-container
