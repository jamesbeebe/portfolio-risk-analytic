# Project-wide tooling configuration.
# This file centralizes linting, formatting, and pytest defaults so local
# development and CI use the same rules instead of duplicating config.

[tool.ruff]
target-version = "py311"
line-length = 88
exclude = [
  "alembic/versions/",
  ".venv/",
]

[tool.ruff.lint]
select = ["E", "W", "F", "I", "UP"]
ignore = ["E501"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
# `-v` makes pytest print each test name.
# `--tb=short` keeps tracebacks compact when failures happen.
addopts = "-v --tb=short"
